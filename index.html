<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Pink Memories</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ffafbd 0%, #ffc3a0 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: white;
        }

        /* Overlay transparan di seluruh layar */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }

        .heart-icon { font-size: 80px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.1);} 100% {transform: scale(1);} }

        #main-content { display: none; text-align: center; }
    </style>
</head>
<body onclick="nyalakanMusik()">

    <!-- Klik di mana saja pada area ini untuk memicu suara -->
    <div id="overlay">
        <div class="heart-icon">❤️</div>
        <p style="font-weight: bold; margin-top: 20px;">Ketuk layar untuk memulai ✨</p>
    </div>

    <div id="main-content">
        <h1>Aku Milikmu - Dewa 19</h1>
        <p>Kenangan kita sedang berputar...</p>
        <div id="youtube-player"></div>
    </div>

    <script>
        var musikDimulai = false;

        function nyalakanMusik() {
            if (!musikDimulai) {
                // Sembunyikan overlay & tampilkan konten
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

                // Masukkan iframe YouTube (gT9g1cW1H-4 adalah ID lagu Aku Milikmu)
                var area = document.getElementById('youtube-player');
                area.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/gT9g1cW1H-4?autoplay=1&loop=1&playlist=gT9g1cW1H-4" frameborder="0" allow="autoplay"></iframe>`;
                
                musikDimulai = true;
            }
        }
    </script>
</body>
</html>
